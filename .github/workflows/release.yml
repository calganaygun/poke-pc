name: Release

on:
  push:
    tags:
      - "v*" # Trigger only on version tags

permissions:
  contents: write
  packages: read

jobs:
  macos-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check Apple signing secrets
        id: apple_signing
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERT_P12_BASE64" ] && [ -n "$APPLE_CERT_PASSWORD" ] && [ -n "$APPLE_SIGN_IDENTITY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync versions from tag
        run: node scripts/sync-version-from-tag.mjs "$GITHUB_REF_NAME"

      - name: Import Apple signing certificate (optional)
        if: ${{ steps.apple_signing.outputs.enabled == 'true' }}
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}

      - name: Build macOS app and DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_BUILD: ${{ github.run_number }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_SPECIFIC_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APP_BUNDLE_ID: dev.calgan.poke-pc
        run: |
          cd macos-app
          ./scripts/release.sh

      - name: Publish release and DMG asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          files: |
            macos-app/build/Poke-PC.dmg

  npm-publish:
    runs-on: ubuntu-latest
    needs: macos-release
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Check npm publish token
        id: npm_token
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is not set. npm publish will be skipped."
          fi

      - name: Checkout
        if: ${{ steps.npm_token.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.npm_token.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Sync versions from tag
        if: ${{ steps.npm_token.outputs.enabled == 'true' }}
        run: node scripts/sync-version-from-tag.mjs "$GITHUB_REF_NAME"

      - name: Install dependencies
        if: ${{ steps.npm_token.outputs.enabled == 'true' }}
        run: npm ci

      - name: Build package
        if: ${{ steps.npm_token.outputs.enabled == 'true' }}
        run: npm run build

      - name: Publish to npm
        if: ${{ steps.npm_token.outputs.enabled == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
